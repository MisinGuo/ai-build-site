services:
  frontend:
    image: node:18-alpine
    pull_policy: always
    container_name: gamebox-frontend-builder
    working_dir: /work
    env_file:
      - ./1panel.env
    volumes:
      - repo:/work
      - pnpm_store:/root/.local/share/pnpm/store
      - dist:/work/RuoYi-Vue3/dist
    environment:
      GIT_REPO: "gitlab.misindata.com/GameBox/gamebox.pages.misindata.com.git"
      GIT_BRANCH: "main"
      PNPM_HOME: "/root/.local/share/pnpm"
    command: >
      sh -c '
        set -e
        
        echo "配置 Alpine 镜像源..."
        sed -i "s/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g" /etc/apk/repositories
        
        apk add --no-cache git bash
        
        if [ ! -d /work/.git ]; then
          echo "初始化代码仓库..."
          git init /work
          cd /work
          git remote add origin "https://$$GIT_USER:$$GIT_PASS@$$GIT_REPO"
          git fetch --all
          git reset --hard "origin/$$GIT_BRANCH"
        else
          echo "代码仓库已存在..."
          cd /work
        fi
        
        echo "更新代码..."
        git fetch --all --prune
        git reset --hard "origin/$$GIT_BRANCH"
        
        cd /work/RuoYi-Vue3
        echo "安装 pnpm..."
        npm install -g pnpm --registry=https://registry.npmmirror.com
        
        echo "配置 pnpm 镜像源..."
        pnpm config set registry https://registry.npmmirror.com
        
        echo "使用 Docker 部署专用的环境配置..."
        cp .env.production .env.production.backup
        echo "VITE_APP_TITLE = SEO多站点管理系统" > .env.production
        echo "VITE_APP_ENV = production" >> .env.production
        echo "VITE_BASE_PATH = /" >> .env.production
        echo "VITE_APP_BASE_API = /prod-api" >> .env.production
        echo "VITE_BUILD_COMPRESS = gzip" >> .env.production
        
        echo "安装依赖..."
        pnpm install
        
        echo "构建前端项目..."
        pnpm run build:prod
        
        echo "构建完成！保持容器运行..."
        tail -f /dev/null
      '
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    pull_policy: always
    container_name: gamebox-frontend-nginx
    volumes:
      - dist:/usr/share/nginx/html
    ports:
      - "8896:80"
    depends_on:
      - frontend
    command: >
      sh -c '
        echo "resolver 8.8.8.8 8.8.4.4 valid=10s;" > /etc/nginx/conf.d/default.conf;
        echo "resolver_timeout 5s;" >> /etc/nginx/conf.d/default.conf;
        echo "" >> /etc/nginx/conf.d/default.conf;
        echo "server {" >> /etc/nginx/conf.d/default.conf;
        echo "    listen 80;" >> /etc/nginx/conf.d/default.conf;
        echo "    server_name localhost;" >> /etc/nginx/conf.d/default.conf;
        echo "    root /usr/share/nginx/html;" >> /etc/nginx/conf.d/default.conf;
        echo "    index index.html;" >> /etc/nginx/conf.d/default.conf;
        echo "    gzip on;" >> /etc/nginx/conf.d/default.conf;
        echo "    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;" >> /etc/nginx/conf.d/default.conf;
        echo "    gzip_min_length 1000;" >> /etc/nginx/conf.d/default.conf;
        echo "    # 预览代理：直接转发到后端（不需要 /prod-api 前缀，Spring Boot 有 @Anonymous 不校验 JWT）" >> /etc/nginx/conf.d/default.conf;
        echo "    location ~* ^/gamebox/code-manage/[0-9]+/preview/ {" >> /etc/nginx/conf.d/default.conf;
        echo "        set \$$backend \"local.zeusai.top:8890\";" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_pass http://\$$backend;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header Host \$$host;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header X-Real-IP \$$remote_addr;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header X-Forwarded-Proto \$$scheme;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_connect_timeout 60s;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_send_timeout 60s;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_read_timeout 600s;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_buffering off;" >> /etc/nginx/conf.d/default.conf;
        echo "    }" >> /etc/nginx/conf.d/default.conf;
        echo "    # WebSocket 日志推送（重建进度实时推送）" >> /etc/nginx/conf.d/default.conf;
        echo "    location ^~ /ws/ {" >> /etc/nginx/conf.d/default.conf;
        echo "        set \$$backend \"local.zeusai.top:8890\";" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_pass http://\$$backend;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_http_version 1.1;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header Upgrade \$$http_upgrade;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header Connection \"upgrade\";" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header Host \$$host;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header X-Real-IP \$$remote_addr;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_read_timeout 3600s;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_send_timeout 3600s;" >> /etc/nginx/conf.d/default.conf;
        echo "    }" >> /etc/nginx/conf.d/default.conf;
        echo "    location ^~ /prod-api/ {" >> /etc/nginx/conf.d/default.conf;
        echo "        set \$$backend \"local.zeusai.top:8890\";" >> /etc/nginx/conf.d/default.conf;
        echo "        rewrite ^/prod-api/(.*) /\$$1 break;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_pass http://\$$backend;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header Host \$$host;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header X-Real-IP \$$remote_addr;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_set_header X-Forwarded-Proto \$$scheme;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_connect_timeout 60s;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_send_timeout 600s;" >> /etc/nginx/conf.d/default.conf;
        echo "        proxy_read_timeout 600s;" >> /etc/nginx/conf.d/default.conf;
        echo "    }" >> /etc/nginx/conf.d/default.conf;
        echo "    location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$$ {" >> /etc/nginx/conf.d/default.conf;
        echo "        expires 1y;" >> /etc/nginx/conf.d/default.conf;
        echo "        add_header Cache-Control \"public, immutable\";" >> /etc/nginx/conf.d/default.conf;
        echo "    }" >> /etc/nginx/conf.d/default.conf;
        echo "    location / {" >> /etc/nginx/conf.d/default.conf;
        echo "        try_files \$$uri \$$uri/ /index.html;" >> /etc/nginx/conf.d/default.conf;
        echo "    }" >> /etc/nginx/conf.d/default.conf;
        echo "}" >> /etc/nginx/conf.d/default.conf;
        nginx -g "daemon off;"
      '
    restart: unless-stopped

volumes:
  repo:
  pnpm_store:
  dist:
