services:
  app:
    build:
      context: .
      dockerfile_inline: |
        FROM maven:3.9-eclipse-temurin-17
        RUN apt-get update -qq \
            && apt-get install -y -qq curl git \
            && curl -fsSL https://deb.nodesource.com/setup_20.x | bash - \
            && apt-get install -y -qq nodejs \
            && npm install -g pnpm \
            && apt-get clean \
            && rm -rf /var/lib/apt/lists/*
        RUN java -version && mvn -version && node -v && npm -v && pnpm -v
    image: gamebox-app:latest
    container_name: gamebox-app
    working_dir: /work
    env_file:
      - ./1panel.env
    volumes:
      - repo:/work
      - m2:/root/.m2
      - ruoyi_upload:/home/ruoyi/uploadPath
    environment:
      GIT_REPO: "gitlab.misindata.com/GameBox/gamebox.pages.misindata.com.git"
      GIT_BRANCH: "main"
      SPRING_PROFILES_ACTIVE: "prod,druid"
      MAVEN_OPTS: "-Xms256m -Xmx1024m"
      RUOYI_PROFILE: "/home/ruoyi/uploadPath"
    command: >
      bash -lc '
        set -e

        if [ ! -d /work/.git ]; then
          echo "Clone repo..."
          git clone "https://$$GIT_USER:$$GIT_PASS@$$GIT_REPO" /work
        fi

        cd /work
        echo "Update code..."
        git fetch --all --prune
        git reset --hard "origin/$$GIT_BRANCH"

        echo "Building jar..."
        mvn -DskipTests clean package

        echo "Starting application (java -jar)..."
        exec java -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+ExitOnOutOfMemoryError -jar ruoyi-admin/target/ruoyi-admin.jar --spring.profiles.active=$${SPRING_PROFILES_ACTIVE}
      '
    ports:
      - "8890:8080"
    restart: unless-stopped

volumes:
  repo:
  m2:
  ruoyi_upload:
